name: Build Ubuntu Touch A10
on:
  workflow_dispatch:
jobs:
  build_job:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install Dependencies
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y git gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python2

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          git config --global user.name "Builder"
          git config --global user.email "build@example.com"

      - name: Sync Halium Source
        run: |
          export PATH=$PATH:~/bin
          repo init -u https://github.com/Halium/android.git -b halium-9.0 --depth=1
          repo sync -c -j8 --force-sync --no-clone-bundle --no-tags

      - name: Clone Galaxy A10 Trees
        run: |
          git clone https://github.com/geckyn/android_device_samsung_a10.git -b lineage-17.1 device/samsung/a10
          git clone https://github.com/geckyn/proprietary_vendor_samsung_a10.git -b lineage-17.1 vendor/samsung/a10
          git clone https://github.com/geckyn/android_kernel_samsung_exynos7885.git -b lineage-17.1 kernel/samsung/a10

      - name: Halium-ize Device Tree
        run: |
          cp device/samsung/a10/lineage_a10.mk device/samsung/a10/halium_a10.mk
          sed -i 's/lineage_a10/halium_a10/g' device/samsung/a10/halium_a10.mk

          mkdir -p vendor/samsung/a10
          REAL_VENDOR_MK=$(find vendor/samsung/a10 -maxdepth 1 -name "*.mk" | grep "vendor" | head -n 1)
          if [ -n "$REAL_VENDOR_MK" ]; then
            echo "Found vendor config at $REAL_VENDOR_MK. Linking to expected path..."
            cp "$REAL_VENDOR_MK" vendor/samsung/a10/a10-vendor.mk
          else
            echo "No vendor file found, creating a placeholder to stop the error."
            touch vendor/samsung/a10/a10-vendor.mk
          fi

          sed -i '/vendor\/lineage/d' device/samsung/a10/halium_a10.mk
          sed -i '/sepolicy\.mk/d' device/samsung/a10/BoardConfig.mk
          find vendor/samsung/a10 -name "Android.bp" -exec grep -l "android_app_import\|android_app_certificate" {} \; | xargs rm -f

          python3 - << 'PYEOF'
          c = open('vendor/lineage/build/soong/Android.bp').read()
          out, i, n = [], 0, len(c)
          while i < n:
              b = c.find('{', i)
              if b < 0:
                  out.append(c[i:])
                  break
              d, j = 1, b + 1
              while j < n and d > 0:
                  if c[j] == '{': d += 1
                  elif c[j] == '}': d -= 1
                  j += 1
              blk = c[i:j]
              if 'generated_kernel_includes' not in blk:
                  out.append(blk)
              i = j
          open('vendor/lineage/build/soong/Android.bp', 'w').write(''.join(out))
          PYEOF

          echo 'cc_library_headers { name: "generated_kernel_headers", vendor_available: true, }' >> vendor/lineage/build/soong/Android.bp

          echo 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/halium_a10.mk' > device/samsung/a10/AndroidProducts.mk

      - name: Install Cross Compiler
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Kernel Manually
        run: |
          cd kernel/samsung/a10
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          ls arch/arm64/configs/ | grep -i "a10\|exynos7885\|samsung"
          make exynos7885-a10_defconfig HOSTCFLAGS="-fcommon" || \
          make a10_defconfig HOSTCFLAGS="-fcommon" || \
          make exynos7885_defconfig HOSTCFLAGS="-fcommon"
          make -j$(nproc) HOSTCFLAGS="-fcommon" KCFLAGS="-Wno-error=stringop-overread -Wno-error=stringop-overflow"
          cd ../../..
          find kernel/samsung/a10/arch/arm64/boot -name "Image*" -o -name "zImage" | head -5
      - name: Build Halium Images
        run: |
          export PATH=$PATH:~/bin
          export ALLOW_MISSING_DEPENDENCIES=true
          KERNEL_IMAGE=$(find kernel/samsung/a10/arch/arm64/boot -name "Image.gz-dtb" -o -name "Image-dtb" -o -name "Image.gz" -o -name "Image" | head -n 1)
          echo "Using kernel: $KERNEL_IMAGE"
          echo "TARGET_PREBUILT_KERNEL := $KERNEL_IMAGE" >> device/samsung/a10/BoardConfig.mk
          source build/envsetup.sh
          lunch halium_a10-userdebug
          mka halium-boot -j$(nproc)
          mka systemimage -j$(nproc)

      - name: Upload Finished Images
        uses: actions/upload-artifact@v4
        with:
          name: A10-Ubuntu-Touch-Images
          path: |
            out/target/product/a10/halium-boot.img
            out/target/product/a10/system.img
